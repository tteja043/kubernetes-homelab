apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: homelab-readonly
  namespace: homelab

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - secrets
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
