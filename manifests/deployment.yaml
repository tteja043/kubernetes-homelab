apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: homelab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80     
        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html

        env:
        - name: APP_USERNAME
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: username
        - name: APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: password
     
      volumes:
      - name: nginx-storage
        persistentVolumeClaim:
          claimName: nginx-pvc    
