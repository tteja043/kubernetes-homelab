apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/tteja043/kubernetes-homelab.git
    targetRevision: main
    path: helm/nginx

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: homelab

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
